model:
  type: SSBSN
  kwargs:
    pd_a: 4
    pd_b: 2
    pd_pad: 2
    R3: True
    R3_T: 8
    R3_p: 0.16
    bsn: SSBSNl
    in_ch: 1
    bsn_base_ch: 128
    bsn_num_module: 9
    mode: [na, na, na, na, na, na, na, ss, ss]
    f_scale: 2
    ss_exp_factor: 1

model_input: [noisy]

trainer: Trainer

training:
  dataset: Confocal

  dataset_args:
    add_noise: None
    crop_size: [256, 256]  # must be divisible by pd_a 
    aug: ['hflip', 'rot']
    n_repeat: 4

  batch_size: 4

  max_epoch: 100

  init_lr: 2e-4
  scheduler:
    type: step
    step:
      step_size: 15
      gamma: 0.5
  loss: 1*self_L1
  tmp_info: []
  optimizer:
    type: Adam
    Adam:
      betas: [0.9, 0.999]

  warmup: False
  warmup_iter: 200

validation:
  dataset: Confocal

  dataset_args:
    crop_size: None
    add_noise: None
    n_data: 10

  norm_factor: 65535.0
  add_con: 0.5
  floor: True
  crop: 256       # SSBlock attention O(N²) — tile large images to avoid OOM
  
  val: True
  save_image: True

  start_epoch: 1
  interval_epoch: 1

checkpoint:
  save: True
  start_epoch: 1
  interval_epoch: 1

log:
  interval_iter: 10

test:
  dataset: Confocal

  dataset_args:
    crop_size: None
    add_noise: None

  norm_factor: 65535.0
  add_con: 0.0
  floor: False

  save_image: True
